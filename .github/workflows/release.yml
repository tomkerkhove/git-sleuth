name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore git-sleuth.slnx

      - name: Build
        run: dotnet build git-sleuth.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/GitSleuth.Cli.Tests/GitSleuth.Cli.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/GitSleuth.Cli/GitSleuth.Cli.csproj
          --no-build
          --configuration Release
          /p:Version=${{ steps.version.outputs.value }}
          --output ./artifacts

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Git Sleuth ${{ github.ref_name }}"
          files: ./artifacts/*.nupkg
